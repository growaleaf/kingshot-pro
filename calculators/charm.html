<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Governor Charm Calculator — KingshotPro</title>
  <meta name="description" content="Calculate Charm Guide and Charm Design costs for Governor Charm upgrades in Kingshot.">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav class="nav"><a class="nav-brand" href="../index.html">KingshotPro</a></nav>
<div class="page"><div class="container">
  <div class="page-header">
    <a class="back-link" href="../index.html">&larr; Home</a>
    <h1>&#10024; Governor Charm Calculator</h1>
    <p>Charm Guide and Charm Design costs for charm upgrades.</p>
  </div>
  <div class="calc-layout">
    <div class="calc-inputs">
      <h2>Parameters</h2>
      <div class="form-group">
        <label for="ch-from">Current charm level</label>
        <select id="ch-from"></select>
      </div>
      <div class="form-group">
        <label for="ch-to">Target charm level</label>
        <select id="ch-to"></select>
      </div>
      <button class="btn btn-primary btn-full" id="ch-calc-btn">Calculate</button>
    </div>
    <div class="calc-results">
      <h2>Charm Costs</h2>
      <div id="ch-results">
        <p class="result-placeholder">Select levels and click Calculate.</p>
      </div>
    </div>
  </div>
  <div class="ad-slot" data-slot="calc-result-below"></div>
</div></div>
<footer class="footer"><div class="footer-inner">
  <div><div class="footer-brand">KingshotPro</div>
  <p class="footer-note">Unofficial. Not affiliated with Century Games.</p></div>
</div></footer>
<script src="../js/layout.js"></script>
<script src="../js/fid.js"></script>
<script src="../js/advisory.js"></script>
<script src="../js/calc-charm.js"></script>
<script src="../js/steward.js"></script>
</body></html>
